name: PR evidence check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited

permissions:
  issues: write
  pull-requests: write

jobs:
  evidence:
    if: >
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    steps:
      - name: Check visual evidence
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- mergeos-pr-evidence-check -->';
            const missingEvidenceLabel = 'evidence: missing';
            const providedEvidenceLabel = 'evidence: provided';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number =
              context.eventName === 'pull_request_target'
                ? context.payload.pull_request.number
                : context.payload.issue.number;

            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issue_number,
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const botComment = comments.find((comment) => comment.body?.includes(marker));
            const reviewerText = [
              pullRequest.body || '',
              ...comments
                .filter((comment) => !comment.body?.includes(marker))
                .map((comment) => comment.body || ''),
            ].join('\n\n');

            const visualEvidencePatterns = [
              /!\[[^\]]*\]\([^)]+\)/i,
              /https?:\/\/github\.com\/user-attachments\/assets\/[a-z0-9-]+/i,
              /https?:\/\/private-user-images\.githubusercontent\.com\/[^\s)]+/i,
              /https?:\/\/[^\s)]+\.(png|jpe?g|gif|webp|mp4|mov|webm)(\?[^\s)]*)?/i,
              /https?:\/\/(?:www\.)?(loom\.com|youtu\.be|youtube\.com|drive\.google\.com|figma\.com)\/[^\s)]+/i,
            ];

            const hasVisualEvidence = visualEvidencePatterns.some((pattern) =>
              pattern.test(reviewerText),
            );

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function removeLabelIfPresent(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function setEvidenceLabel(labelToAdd, labelToRemove) {
              try {
                await ensureLabel(
                  missingEvidenceLabel,
                  'D93F0B',
                  'PR needs screenshot, GIF, video, or visual evidence.',
                );
                await ensureLabel(
                  providedEvidenceLabel,
                  '0E8A16',
                  'PR includes screenshot, GIF, video, or visual evidence.',
                );

                await removeLabelIfPresent(labelToRemove);
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [labelToAdd],
                });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(
                    'Could not update evidence labels. Make sure this workflow has issues: write and the repository allows GitHub Actions read/write permissions.',
                  );
                  return;
                }

                throw error;
              }
            }

            async function writeComment(body) {
              try {
                if (botComment) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: botComment.id,
                    body,
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number,
                    body,
                  });
                }
              } catch (error) {
                if (error.status === 403) {
                  core.warning(
                    'Could not write the evidence reminder comment. Make sure this workflow has pull-requests: write and the repository allows GitHub Actions read/write permissions.',
                  );
                  return;
                }

                throw error;
              }
            }

            if (hasVisualEvidence) {
              await setEvidenceLabel(providedEvidenceLabel, missingEvidenceLabel);

              if (botComment) {
                await writeComment([
                  marker,
                  'Evidence check passed.',
                  '',
                  'I found visual evidence in the PR description or comments. Thanks for adding it.',
                ].join('\n'));
              }

              core.notice('Visual evidence found.');
              return;
            }

            await setEvidenceLabel(missingEvidenceLabel, providedEvidenceLabel);

            const reminder = [
              marker,
              'Evidence check needed.',
              '',
              'I could not find visual evidence in this PR yet. Please add one of the following so reviewers can verify the change:',
              '',
              '- Before/after screenshots',
              '- A short video or GIF showing the changed flow',
              '- A link to uploaded image/video evidence',
              '',
              'After evidence is added to the PR description or comments, this check will update automatically.',
            ].join('\n');

            await writeComment(reminder);

            core.setFailed('Missing visual evidence for this PR.');
