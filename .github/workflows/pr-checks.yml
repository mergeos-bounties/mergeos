name: PR checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Scan committed files for secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir --no-banner --redact=100 --verbose /repo

  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum

      - name: Verify Go modules
        working-directory: backend
        run: go mod verify

      - name: Scan Go vulnerabilities
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

      - name: Vet backend
        working-directory: backend
        run: go vet ./...

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build backend
        working-directory: backend
        run: |
          mkdir -p dist
          go build -o dist/mergeos ./cmd/mergeos

  web:
    name: Web build and test (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend
          - admin
          - scan
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Audit npm dependencies
        working-directory: ${{ matrix.app }}
        run: npm audit --audit-level=high

      - name: Test app
        working-directory: ${{ matrix.app }}
        run: npm test --if-present

      - name: Build app
        working-directory: ${{ matrix.app }}
        run: npm run build

  # MergeIDE extracted to mergeos-bounties/MRGMinner (own CI there)

  solana-contract:
    name: Solana contract metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test Solana IDL
        run: node --test contracts/solana/test/idl.test.js

  protocol:
    name: Protocol schema package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test protocol schemas
        working-directory: protocol
        run: npm test

  sdk:
    name: SDK package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test SDK helpers
        working-directory: sdk
        run: npm test
