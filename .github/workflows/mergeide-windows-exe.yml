name: Build MergeIDE Windows exe

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to create or update with the Windows exe. Defaults to mergeide-windows-latest.
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
      - "mergeide-v*"
    paths:
      - "MergeIDE/**"
      - ".github/workflows/mergeide-windows-exe.yml"

permissions:
  contents: write

env:
  MERGEIDE_EXE_NAME: MergeIDE-Windows-x64.exe
  MERGEIDE_CHECKSUM_NAME: MergeIDE-Windows-x64.exe.sha256
  MERGEIDE_BUILD_INFO_NAME: MergeIDE-Windows-x64.build.json
  MERGEIDE_DEFAULT_RELEASE_TAG: mergeide-windows-latest

concurrency:
  group: mergeide-windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MergeIDE/package-lock.json

      - name: Install dependencies
        working-directory: MergeIDE
        run: npm ci

      - name: Audit npm dependencies
        working-directory: MergeIDE
        run: npm audit --audit-level=high

      - name: Test MergeIDE
        working-directory: MergeIDE
        run: npm test

      - name: Build Windows executable
        working-directory: MergeIDE
        run: npm run build:exe

      - name: Resolve release target
        shell: pwsh
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          $tag = $env:RELEASE_TAG_INPUT
          if (-not $tag -and "${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag) {
            $tag = $env:MERGEIDE_DEFAULT_RELEASE_TAG
          }

          $repoUrl = "https://github.com/$env:GITHUB_REPOSITORY"
          "MERGEIDE_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MERGEIDE_RELEASE_URL=$repoUrl/releases/tag/$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MERGEIDE_DOWNLOAD_URL=$repoUrl/releases/download/$tag/$env:MERGEIDE_EXE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MERGEIDE_WORKFLOW_RUN_URL=$repoUrl/actions/runs/$env:GITHUB_RUN_ID" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MERGEIDE_WORKFLOW_ARTIFACTS_URL=$repoUrl/actions/runs/$env:GITHUB_RUN_ID#artifacts" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Generate release metadata
        shell: pwsh
        run: |
          $exePath = Join-Path "MergeIDE/dist" $env:MERGEIDE_EXE_NAME
          if (-not (Test-Path $exePath)) {
            throw "Expected executable was not built: $exePath"
          }

          $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:MERGEIDE_EXE_NAME" | Set-Content -Path "MergeIDE/dist/$env:MERGEIDE_CHECKSUM_NAME" -Encoding ascii

          $buildInfo = [ordered]@{
            product = "MergeIDE"
            artifact = $env:MERGEIDE_EXE_NAME
            sha256 = $hash
            repository = $env:GITHUB_REPOSITORY
            commit = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            workflow_run_url = $env:MERGEIDE_WORKFLOW_RUN_URL
            workflow_artifacts_url = $env:MERGEIDE_WORKFLOW_ARTIFACTS_URL
            release_tag = $env:MERGEIDE_RELEASE_TAG
            release_url = $env:MERGEIDE_RELEASE_URL
            download_url = $env:MERGEIDE_DOWNLOAD_URL
            built_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          }
          $buildInfo | ConvertTo-Json | Set-Content -Path "MergeIDE/dist/$env:MERGEIDE_BUILD_INFO_NAME" -Encoding utf8

          "MERGEIDE_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Smoke Windows executable
        working-directory: MergeIDE
        shell: pwsh
        run: .\dist\MergeIDE-Windows-x64.exe --help

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: MergeIDE-Windows-x64
          path: |
            MergeIDE/dist/${{ env.MERGEIDE_EXE_NAME }}
            MergeIDE/dist/${{ env.MERGEIDE_CHECKSUM_NAME }}
            MergeIDE/dist/${{ env.MERGEIDE_BUILD_INFO_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload executable to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:MERGEIDE_RELEASE_TAG

          $mergeIDEPage = "https://mergeos.shop/mergeide"
          $isDefaultRelease = $tag -eq $env:MERGEIDE_DEFAULT_RELEASE_TAG
          $releaseTitle = if ($isDefaultRelease) { "MergeIDE Windows latest" } else { "MergeIDE $tag" }
          $releaseNotes = if ($isDefaultRelease) {
            "Latest MergeIDE Windows executable built by GitHub Actions.`n`nMergeIDE page: $mergeIDEPage`nSHA256: ``$env:MERGEIDE_SHA256``"
          } else {
            "MergeIDE Windows executable build for $tag.`n`nMergeIDE page: $mergeIDEPage`nSHA256: ``$env:MERGEIDE_SHA256``"
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target $env:GITHUB_SHA `
              --title $releaseTitle `
              --notes $releaseNotes `
              --latest
          } else {
            gh release edit $tag `
              --target $env:GITHUB_SHA `
              --title $releaseTitle `
              --notes $releaseNotes `
              --latest
          }

          gh release upload $tag `
            "MergeIDE/dist/$env:MERGEIDE_EXE_NAME" `
            "MergeIDE/dist/$env:MERGEIDE_CHECKSUM_NAME" `
            "MergeIDE/dist/$env:MERGEIDE_BUILD_INFO_NAME" `
            --clobber

          "### MergeIDE Windows exe" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- MergeIDE page: $mergeIDEPage" >> $env:GITHUB_STEP_SUMMARY
          "- Release: $env:MERGEIDE_RELEASE_URL" >> $env:GITHUB_STEP_SUMMARY
          "- Download: $env:MERGEIDE_DOWNLOAD_URL" >> $env:GITHUB_STEP_SUMMARY
          "- Workflow run: $env:MERGEIDE_WORKFLOW_RUN_URL" >> $env:GITHUB_STEP_SUMMARY
          "- Workflow artifact: $env:MERGEIDE_WORKFLOW_ARTIFACTS_URL" >> $env:GITHUB_STEP_SUMMARY
          "- SHA256: ``$env:MERGEIDE_SHA256``" >> $env:GITHUB_STEP_SUMMARY
