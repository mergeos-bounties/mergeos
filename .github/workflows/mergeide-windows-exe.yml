name: Build MergeIDE Windows exe

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to create or update with the Windows exe. Defaults to mergeide-windows-latest.
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
      - "mergeide-v*"
    paths:
      - "MergeIDE/**"
      - ".github/workflows/mergeide-windows-exe.yml"

permissions:
  contents: write

env:
  MERGEIDE_EXE_NAME: MergeIDE-Windows-x64.exe
  MERGEIDE_DEFAULT_RELEASE_TAG: mergeide-windows-latest

concurrency:
  group: mergeide-windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MergeIDE/package-lock.json

      - name: Install dependencies
        working-directory: MergeIDE
        run: npm ci

      - name: Audit npm dependencies
        working-directory: MergeIDE
        run: npm audit --audit-level=high

      - name: Test MergeIDE
        working-directory: MergeIDE
        run: npm test

      - name: Build Windows executable
        working-directory: MergeIDE
        run: npm run build:exe

      - name: Smoke Windows executable
        working-directory: MergeIDE
        shell: pwsh
        run: .\dist\MergeIDE-Windows-x64.exe --help

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: MergeIDE-Windows-x64
          path: MergeIDE/dist/${{ env.MERGEIDE_EXE_NAME }}
          if-no-files-found: error

      - name: Upload executable to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          $tag = $env:RELEASE_TAG_INPUT
          if (-not $tag -and "${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag) {
            $tag = $env:MERGEIDE_DEFAULT_RELEASE_TAG
          }

          $isDefaultRelease = $tag -eq $env:MERGEIDE_DEFAULT_RELEASE_TAG
          $releaseTitle = if ($isDefaultRelease) { "MergeIDE Windows latest" } else { "MergeIDE $tag" }
          $releaseNotes = if ($isDefaultRelease) {
            "Latest MergeIDE Windows executable built by GitHub Actions."
          } else {
            "MergeIDE Windows executable build for $tag."
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target $env:GITHUB_SHA `
              --title $releaseTitle `
              --notes $releaseNotes `
              --latest
          } else {
            gh release edit $tag `
              --title $releaseTitle `
              --notes $releaseNotes `
              --latest
          }

          gh release upload $tag "MergeIDE/dist/$env:MERGEIDE_EXE_NAME" --clobber
